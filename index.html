<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Cliente Nuevo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      max-width: 520px;
      margin: auto;
      background: #f5f7fb;
      color: #202124;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    h2 {
      margin-top: 0;
    }

    button, a.boton {
      width: 100%;
      box-sizing: border-box;
      display: block;
      text-align: center;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
      text-decoration: none;
      margin-top: 16px;
    }

    button:disabled {
      background: #9aa0a6;
      cursor: not-allowed;
    }

    a.boton {
      background: #188038;
    }

    .estado {
      margin-top: 18px;
      line-height: 1.5;
      font-size: 15px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .nota {
      font-size: 13px;
      color: #5f6368;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Registro de cliente nuevo</h2>

    <p>
      Presiona el botón para capturar la ubicación del cliente.
      Luego se abrirá el formulario con longitud, latitud, dirección, provincia y ciudad ya llenas.
    </p>

    <button id="botonCaptura" onclick="capturarUbicacion()" disabled>
      Cargando Google Maps...
    </button>

    <div id="estado" class="estado"></div>

    <a id="botonFormulario"
       class="boton"
       href="#"
       style="display:none;">
      Abrir formulario manualmente
    </a>

    <p class="nota">
      Si el teléfono solicita permiso de ubicación, debes aceptar para continuar.
    </p>
  </div>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdHklQnP509a296rqgH0QLzoZ2jQRXCZ-0_eRZPpkgdozO4OQ/viewform";

    const ENTRY_LONGITUD = "entry.771075934";
    const ENTRY_LATITUD = "entry.1759578182";
    const ENTRY_DIRECCION = "entry.1307633364";
    const ENTRY_PROVINCIA = "entry.398052092";
    const ENTRY_CIUDAD = "entry.1982114114";

    let geocoder = null;

    function initGoogleMaps() {
      geocoder = new google.maps.Geocoder();

      const botonCaptura = document.getElementById("botonCaptura");
      botonCaptura.disabled = false;
      botonCaptura.innerText = "Capturar ubicación y abrir formulario";
    }

    function capturarUbicacion() {
      const estado = document.getElementById("estado");
      const botonFormulario = document.getElementById("botonFormulario");

      botonFormulario.style.display = "none";
      botonFormulario.href = "#";

      if (!navigator.geolocation) {
        estado.innerHTML = '<span class="error">Este navegador no permite capturar ubicación.</span>';
        return;
      }

      if (!geocoder) {
        estado.innerHTML = '<span class="error">Google Maps todavía no está listo. Espera unos segundos e intenta nuevamente.</span>';
        return;
      }

      estado.innerHTML = "Solicitando ubicación. Acepta el permiso del navegador...";

      navigator.geolocation.getCurrentPosition(
        function(posicion) {
          const lat = posicion.coords.latitude;
          const lng = posicion.coords.longitude;
          const precision = Math.round(posicion.coords.accuracy);

          const latTexto = lat.toFixed(7);
          const lngTexto = lng.toFixed(7);

          estado.innerHTML =
            "Ubicación capturada correctamente.<br>" +
            "Latitud: " + latTexto + "<br>" +
            "Longitud: " + lngTexto + "<br>" +
            "Precisión aproximada: " + precision + " metros<br><br>" +
            "Consultando dirección en Google Maps...";

          obtenerDireccionGoogleMaps(lat, lng, latTexto, lngTexto);
        },
        function(error) {
          let mensaje = "";

          if (error.code === 1) {
            mensaje = "Permiso de ubicación denegado.";
          } else if (error.code === 2) {
            mensaje = "La ubicación no está disponible.";
          } else if (error.code === 3) {
            mensaje = "Tiempo agotado al intentar obtener la ubicación.";
          } else {
            mensaje = "Error desconocido al obtener la ubicación.";
          }

          estado.innerHTML =
            '<span class="error">' + mensaje + "</span><br><br>" +
            "Activa el GPS, permite la ubicación en Safari/Chrome y vuelve a intentar.";
        },
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 0
        }
      );
    }

    function obtenerDireccionGoogleMaps(lat, lng, latTexto, lngTexto) {
      const estado = document.getElementById("estado");

      geocoder.geocode(
        {
          location: {
            lat: lat,
            lng: lng
          },
          region: "EC",
          language: "es"
        },
        function(results, status) {
          if (status === "OK" && results && results.length > 0) {
            const mejorResultado = results[0];

            const direccion = mejorResultado.formatted_address || "";
            const componentes = mejorResultado.address_components || [];

            const provincia = obtenerComponente(componentes, "administrative_area_level_1");

            const ciudad =
              obtenerComponente(componentes, "locality") ||
              obtenerComponente(componentes, "administrative_area_level_2") ||
              obtenerComponente(componentes, "administrative_area_level_3") ||
              obtenerComponente(componentes, "sublocality") ||
              "";

            abrirFormulario(latTexto, lngTexto, direccion, provincia, ciudad);
          } else {
            estado.innerHTML =
              '<span class="error">No se pudo obtener la dirección desde Google Maps.</span><br><br>' +
              "Se abrirá el formulario solo con latitud y longitud.";

            abrirFormulario(latTexto, lngTexto, "", "", "");
          }
        }
      );
    }

    function obtenerComponente(componentes, tipoBuscado) {
      for (let i = 0; i < componentes.length; i++) {
        if (componentes[i].types && componentes[i].types.indexOf(tipoBuscado) !== -1) {
          return componentes[i].long_name;
        }
      }

      return "";
    }

    function abrirFormulario(latTexto, lngTexto, direccion, provincia, ciudad) {
      const estado = document.getElementById("estado");
      const botonFormulario = document.getElementById("botonFormulario");

      const params = new URLSearchParams();

      params.set("usp", "pp_url");
      params.set(ENTRY_LONGITUD, lngTexto);
      params.set(ENTRY_LATITUD, latTexto);
      params.set(ENTRY_DIRECCION, direccion);
      params.set(ENTRY_PROVINCIA, provincia);
      params.set(ENTRY_CIUDAD, ciudad);

      const urlFinal = FORM_URL + "?" + params.toString();

      estado.innerHTML =
        "Datos obtenidos correctamente:<br>" +
        "Dirección: " + (direccion || "No encontrada") + "<br>" +
        "Provincia: " + (provincia || "No encontrada") + "<br>" +
        "Ciudad: " + (ciudad || "No encontrada") + "<br><br>" +
        "Abriendo formulario...";

      botonFormulario.href = urlFinal;
      botonFormulario.style.display = "block";

      setTimeout(function() {
        window.location.href = urlFinal;
      }, 1000);
    }
  </script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdb2nCetDQzYiP7LHmvC7myILt6JlLvNA&callback=initGoogleMaps&language=es&region=EC">
  </script>
</body>
</html>
